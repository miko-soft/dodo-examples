<h1>dd-elem</h1>
Captures a DOM element and stores it in the controller as <code>this.$dd.elems</code>.

<br><br>
<button dd-click="runELEM()">run ELEM</button> <small>Click the button multiple times to toggle the text color.</small>
<p style="font-weight:bold" dd-elem="myElem">this element is captured and stored in the controller (this.$dd.elems)</p>
