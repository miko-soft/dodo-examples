<h1>dd-src</h1>
Sets the src attribute from a controller property value. The property must be a string.

<br><br>
<h3>Controller property</h3>
<button dd-click="runSRC()">run SRC</button>
<br><img dd-src="$model.imageURL" style="width:130px;height:130px;"> — no default src
<br><img dd-src="$model.imageURL --https://via.placeholder.com/130" style="width:130px;height:130px;"> — has a default src


<br><br><br>
<h3>Controller method</h3>
<img dd-src="setImage('url')" dd-style="setImage('size')">
