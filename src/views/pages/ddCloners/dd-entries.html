<h1>dd-entries Simple Example</h1>
Iterate over a plain object using <b>dd-entries</b>. Unlike <b>dd-each</b> (for arrays), <b>dd-entries</b> uses <code>Object.entries()</code> and the option order is <b>--key,val</b>.
<br><br>

<hr>
<i style="color:brown;font: 18px Verdana;">User object:</i>
<br>
<p dd-entries="user --key,val"><b>{{key}}:</b> {{val}}</p>
