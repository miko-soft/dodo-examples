<h1>plugCSS(), unplugCSS()</h1>
<p>
  <br>plugCSS() inserts a <b style="font-size:smaller">&lt;style dd-ref="#reference"&gt;&lt;/style&gt;</b> tag into the &lt;head&gt;.
  <br>unplugCSS() removes the style tag identified by <b>dd-ref="#reference"</b>. To test this, click <a href="/" dd-href>HOME</a> and observe DevTools &rarr; Elements.
</p>
